<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Science Innovations — Lola Lavin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{min-height:100vh;background:radial-gradient(ellipse at 20% 50%,#1a0533 0%,#000510 40%,#00001a 70%,#050005 100%);color:#e8e0f0;font-family:"Jost",sans-serif;font-weight:300;}
    canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:center;flex-wrap:wrap;gap:4px;padding:18px;background:linear-gradient(to bottom,rgba(0,0,10,0.97),transparent);}
    nav a{color:#c0b0e0;text-decoration:none;font-family:"Jost",sans-serif;font-weight:600;font-size:14px;letter-spacing:2px;text-transform:uppercase;padding:8px 18px;border:1px solid transparent;border-radius:20px;transition:all 0.3s ease;}
    nav a:hover,nav a.active{color:#f0e0ff;border-color:rgba(180,140,255,0.5);background:rgba(120,80,200,0.2);}
    .page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:120px 40px 80px;max-width:900px;margin:0 auto;text-align:center;}
    .page-label{font-size:13px;letter-spacing:4px;text-transform:uppercase;color:#9080c0;margin-bottom:16px;}
    h1{font-family:"Cormorant Garamond",serif;font-weight:300;font-size:clamp(48px,8vw,80px);color:#f0eaff;line-height:1.05;margin-bottom:24px;}
    .divider{width:60px;height:1px;background:linear-gradient(to right,transparent,#7050c0,transparent);margin:0 auto 40px;}
    .coming-soon{font-size:18px;color:#7060a0;line-height:1.9;}
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <nav>
    <a href="index.html">Home</a>
    <a href="music.html">Music</a>
    <a href="athletics.html">Athletics</a>
    <a href="volunteering.html">Volunteering</a>
    <a href="commitments.html">Commitments</a>
    <a href="stem.html">STEAM</a>
    <a href="science.html" class="active">Science</a>
    <a href="wpga.html">WPGA</a>
  </nav>
  <div class="page">
    <p class="page-label">Lola Estelle Lavin</p>
    <h1>Science Innovations</h1>
    <div class="divider"></div>
    <p class="coming-soon">Coming soon — self-conducted science projects and experiments.</p>
  </div>
  <script>
    const c=document.getElementById("stars"),ctx=c.getContext("2d");let stars=[];
    function resize(){c.width=innerWidth;c.height=innerHeight;}
    function init(){stars=[];for(let i=0;i<200;i++)stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.2,o:Math.random(),s:Math.random()*0.005+0.001});}
    function draw(){ctx.clearRect(0,0,c.width,c.height);stars.forEach(s=>{s.o+=s.s;if(s.o>1||s.o<0)s.s*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(220,200,255,${s.o})`;ctx.fill();});requestAnimationFrame(draw);}
    resize();init();draw();window.addEventListener("resize",()=>{resize();init();});
  </script>
</body>
</html>
